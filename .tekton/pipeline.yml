apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: final-ci-cd-pipeline
spec:
  params:
    - name: app-name
    - name: build-image
    - name: repo-url
  workspaces:
    - name: output

  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      runAfter: [cleanup]
      taskRef:
        name: git-clone
        kind: ClusterTask
      workspaces:
        - name: output
          workspace: output
      params:
        - name: url
          value: "$(params.repo-url)"
        - name: revision
          value: "main"

    - name: flake8
      runAfter: [git-clone]
      taskRef:
        name: flake8
        kind: ClusterTask
      workspaces:
        - name: source
          workspace: output

    - name: nose
      runAfter: [flake8]
      taskRef:
        name: nose
      workspaces:
        - name: source
          workspace: output

    - name: buildah
      runAfter: [nose]
      taskRef:
        name: buildah
        kind: ClusterTask
      workspaces:
        - name: source
          workspace: output
      params:
        - name: IMAGE
          value: "$(params.build-image)"

    - name: deploy
      runAfter: [buildah]
      taskRef:
        name: openshift-client
        kind: ClusterTask
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) --image=$(params.build-image) --dry-run=client -o yaml | oc apply -f -